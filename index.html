    <style>
        body, html { height: 100%; margin: 0; overflow: hidden; background-color: #f3f4f6; position: fixed; width: 100%; touch-action: manipulation; }
        .view-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background: #f3f4f6; z-index: 10; }
        .view-screen.active { display: flex; }
        
        #main-view { z-index: 10; }
        #history-view, #detail-view, #settings-view, #map-overlay { z-index: 200; }
        
        .stat-card { background: white; padding: 1rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; align-items: center; }
        #map, #detail-map { flex-grow: 1; width: 100%; position: relative; z-index: 1; border-radius: 1rem; overflow: hidden; }
        
        .mode-btn { cursor: pointer; -webkit-tap-highlight-color: transparent; position: relative; z-index: 50; touch-action: none; }
        .mode-btn i { pointer-events: none; }
        .mode-btn.active { background-color: #ec4899 !important; color: white !important; box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); }
        
        #ai-container { position: fixed; bottom: 100px; left: 20px; width: auto; max-width: 280px; display: flex; align-items: flex-end; gap: 12px; z-index: 80; pointer-events: none; }
        #ai-avatar { width: 64px; height: 64px; min-width: 64px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background-color: #fdf2f8; overflow: hidden; pointer-events: auto; }
        #ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
        #ai-chat-bubble { background: white; padding: 12px 16px; border-radius: 20px 20px 20px 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: none; pointer-events: auto; border-left: 4px solid #ec4899; }
        
        #nav-hud { display: none; background: rgba(30, 41, 59, 0.95); color: white; padding: 16px; border-radius: 20px; margin-bottom: 4px; z-index: 40; }
        
        .custom-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 0, 0, 0.9); color: white; padding: 12px 20px; border-radius: 12px; z-index: 9999; display: none; font-size: 13px; width: 85%; max-width: 400px; text-align: center; }
        .recording { border: 4px solid #ec4899 !important; background-color: #fce7f3 !important; box-shadow: 0 0 20px rgba(236, 72, 153, 0.5) !important; }
        
        #orbis-flash-overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; display: none; mix-blend-mode: soft-light; }
        @keyframes flash-blue { 0%, 100% { background: rgba(191, 219, 254, 0); } 50% { background: rgba(191, 219, 254, 0.5); } }
        @keyframes flash-yellow { 0%, 100% { background: rgba(253, 224, 71, 0); } 50% { background: rgba(253, 224, 71, 0.6); } }
        @keyframes flash-red { 0%, 100% { background: rgba(239, 68, 68, 0); } 50% { background: rgba(239, 68, 68, 0.7); } }
        .flash-blue { display: block !important; animation: flash-blue 1.5s infinite; }
        .flash-yellow { display: block !important; animation: flash-yellow 1s infinite; }
        .flash-red { display: block !important; animation: flash-red 0.5s infinite; }
        .orbis-marker { background: #ef4444; color: white; border: 2px solid white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="font-sans text-gray-800">

        <div class="p-4 flex flex-col gap-6 overflow-y-auto">
            <div class="bg-white p-5 rounded-2xl border border-pink-100 shadow-sm flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xs font-bold text-pink-500 uppercase">Gemini AI キー設定</h3>
                    <div id="ai-status-badge" class="text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-400">未設定</div>

                <button id="save-key-btn" class="w-full bg-pink-500 text-white font-bold py-3 rounded-xl text-sm shadow-sm active:scale-95 transition-all">キーを保存して有効化</button>

                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">さくらボイス設定</h3>
                <div class="flex items-center gap-4">
                    <button id="mute-toggle-btn" class="bg-gray-100 p-3 rounded-xl text-gray-600"><i data-lucide="volume-2" id="mute-icon"></i></button>
                    <div class="flex-grow"><input type="range" id="volume-slider" min="0" max="100" class="w-full accent-pink-500"></div>

    <div id="toast" class="custom-toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sakura-tracker-v17';
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBfZm1AEMpXvKMcOGdgjJlpQQlXnsx39Qk",
            authDomain: "sakura-gps.firebaseapp.com",
            projectId: "sakura-gps",
            storageBucket: "sakura-gps.firebasestorage.app",
            messagingSenderId: "12221954272",
            appId: "1:12221954272:web:31dd55c3b572c813577885"
        };

        let user = null, auth = null, db = null, map = null, marker = null, polyline = null, currentPos = null;
        let detailMap = null, detailPolyline = null; 
        let isTracking = false, startTime = null, totalDistance = 0, historyPoints = [];
        let voiceVolume = parseFloat(localStorage.getItem('voiceVolume')) || 1.0;
        let isMuted = localStorage.getItem('isMuted') === 'true';
        let lastAddress = "住所取得中...", currentMode = 'walking', isAIThinking = false;
        let lastAddressFetchTime = 0, bubbleTimer = null, chatHistory = [], audioUnlocked = false;
        let ORBIS_LIST = [], currentOrbisZone = 0, orbisMarkers = [], lastOrbisFetchTime = 0;
        let isSpeechRecognizing = false;

        // ★使用可能なモデルを動的に判定
        let currentWorkingModel = localStorage.getItem('AI_WORKING_MODEL') || "gemini-1.5-flash";

        function updateNetworkStatus() {
            const statusEl = document.getElementById('network-status');
            if (statusEl) {
                statusEl.innerHTML = navigator.onLine ? 'ONLINE' : 'OFFLINE';
                statusEl.className = 'text-[9px] font-bold px-2 py-0.5 rounded-full ' + (navigator.onLine ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600');
            }
        }
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);

        function updateClocks() {
            const now = new Date();
            const timeEl = document.getElementById('clock-display');
            if (timeEl) timeEl.textContent = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            if (isTracking && startTime) {
                const diff = Math.floor((Date.now() - startTime) / 1000);
                const hrs = String(Math.floor(diff / 3600)).padStart(2, '0');
                const mins = String(Math.floor((diff % 3600) / 60)).padStart(2, '0');
                const secs = String(diff % 60).padStart(2, '0');
                const el = document.getElementById('time-display');
                if (el) el.textContent = `${hrs}:${mins}:${secs}`;
            }
        }
        setInterval(updateClocks, 1000);

        function unlockAudio() {
            if (audioUnlocked) return;
            const player = document.getElementById('ai-audio-player');
            if(player) { player.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"; player.play().catch(() => {}); }
            audioUnlocked = true;
        }

        const initFirebase = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app); db = getFirestore(app);
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch (e) { await signInAnonymously(auth); }
                    } else { await signInAnonymously(auth); }
                };
                await initAuth();
                onAuthStateChanged(auth, (u) => { 
                    user = u; if (user) { document.getElementById('user-id-display').textContent = `User ID: ${user.uid}`; loadHistory(); }
                });
            } catch (e) { console.error(e); }
        };

        // ★AI接続テストの安定化と自動選別
        async function testAIConnection(manualKey) {
            const badge = document.getElementById('ai-status-badge');
            const errorDetail = document.getElementById('ai-error-detail');
            const key = (manualKey !== undefined ? manualKey : localStorage.getItem('GEMINI_API_KEY'))?.trim();
            
            errorDetail.classList.add('hidden');
            if (!key) {
                badge.textContent = "未設定"; badge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-100 text-gray-400";
                return;
            }
            
            badge.textContent = "検証中..."; badge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-blue-100 text-blue-500";
            
            // 試行するモデルの優先順リスト
            const modelsToTry = [
                "gemini-2.5-flash-preview-09-2025",
                "gemini-2.0-flash",
                "gemini-1.5-flash",
                "gemini-1.5-pro"
            ];

            let lastResult = null;
            for (const model of modelsToTry) {
                try {
                    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                    });
                    
                    if (resp.ok) {
                        currentWorkingModel = model;
                        localStorage.setItem('AI_WORKING_MODEL', model);
                        badge.textContent = "準備完了！";
                        badge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-green-100 text-green-600";
                        return;
                    }
                    
                    const err = await resp.json();
                    lastResult = { status: resp.status, message: err.error?.message || "Unknown error" };
                    
                    // キーが無効な場合は即座に終了（他のモデルを試しても無駄なため）
                    if (resp.status === 403) break;
                    
                } catch (e) {
                    lastResult = { status: "Network", message: e.message };
                }
            }

            // 全て失敗した場合
            if (lastResult.status === 403) badge.textContent = "キー無効(403)";
            else if (lastResult.status === 429) badge.textContent = "制限中(429)";
            else badge.textContent = `エラー(${lastResult.status})`;
            
            errorDetail.textContent = lastResult.message;
            errorDetail.classList.remove('hidden');
            badge.className = "text-[10px] font-bold px-2 py-0.5 rounded-full bg-red-100 text-red-500";
        }

        async function apiFetch(url, body, retries = 3) {
            const key = localStorage.getItem('GEMINI_API_KEY')?.trim() || "";
            if (!key) { showToast("AIキーを設定してな！", true); throw new Error("KEY_MISSING"); }
            let delay = 1000;
            for (let i = 0; i < retries; i++) {
                try {
                    const resp = await fetch(`${url}?key=${key}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    if (!resp.ok) {
                        const err = await resp.json();
                        if (resp.status === 403) throw new Error("INVALID_KEY");
                        if (resp.status === 429) throw new Error("QUOTA_EXCEEDED");
                        throw new Error(err.error?.message || "API_ERROR");
                    }
                    return await resp.json();
                } catch (err) {
                    if (err.message === "INVALID_KEY" || err.message === "QUOTA_EXCEEDED" || i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, delay)); delay *= 2;
                }
            }
        }

        async function askSakuraAI(prompt) {
            if (!prompt || isAIThinking) return;
            showToast(`ゆーみん: 「${prompt}」`);
            isAIThinking = true; chatHistory.push({ role: "user", parts: [{ text: prompt }] });
            if (chatHistory.length > 10) chatHistory = chatHistory.slice(-10);
            try {
                const sys = `あなたは神戸弁の明るい女子学生AI「さくら」です。ユーザーは「ゆーみん」です。現在地: ${lastAddress}。3行以内で返答。`;
                const data = await apiFetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentWorkingModel}:generateContent`, { 
                    contents: chatHistory, systemInstruction: { parts: [{ text: sys }] }, tools: [{ "google_search": {} }] 
                });
                const txt = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (txt) { chatHistory.push({ role: "model", parts: [{ text: txt }] }); speakText(txt); }
            } catch (err) {
                chatHistory.pop();
                if (err.message === "INVALID_KEY") showToast("キーが違うみたいやわ。", true);
                else if (err.message === "QUOTA_EXCEEDED") showToast("ちょっと休憩中や、また後でな！", true);
                else showToast("通信エラーやわ…", true);
            } finally { isAIThinking = false; }
        }

        async function speakText(txt) {
            if (isMuted) return;
            const resp = document.getElementById('ai-response-text'); if (resp) resp.textContent = txt;
            document.getElementById('ai-chat-bubble').style.display = 'block';
            if (bubbleTimer) clearTimeout(bubbleTimer);
            bubbleTimer = setTimeout(() => { document.getElementById('ai-chat-bubble').style.display = 'none'; }, Math.max(3000, txt.length * 200));
            try {
                const data = await apiFetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentWorkingModel}:generateContent`, { 
                    contents: [{ parts: [{ text: `Say cheerfully: ${txt}` }] }], 
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } } 
                });
                const pcm = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;
                if (pcm) { playAudio(pcm); return; }
            } catch(e) {}
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(txt); u.lang = 'ja-JP'; u.volume = voiceVolume;
                window.speechSynthesis.speak(u);
            }
        }

        function playAudio(base64) {
            const bin = atob(base64), bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            const sr = 24000, hdr = new ArrayBuffer(44), v = new DataView(hdr);
            v.setUint32(0, 0x52494646, false); v.setUint32(4, 36 + bin.length, true); v.setUint32(8, 0x57415645, false);
            v.setUint32(12, 0x666d7420, false); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
            v.setUint16(22, 1, true); v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); v.setUint32(36, 0x64617461, false); v.setUint32(40, bin.length, true);
            const player = document.getElementById('ai-audio-player');
            if(player) { player.src = URL.createObjectURL(new Blob([new Uint8Array([...new Uint8Array(hdr), ...bytes])], { type: 'audio/wav' })); player.volume = voiceVolume; player.play().catch(e => console.error(e)); }
        }

        async function fetchOrbisData(lat, lng) {
            if (Date.now() - lastOrbisFetchTime < 60000) return;
            lastOrbisFetchTime = Date.now();
            try {
                const q = `[out:json];node["highway"="speed_camera"](around:10000,${lat},${lng});out;`;
                const resp = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(q)}`);
                const data = await resp.json();
                if (data.elements) {
                    ORBIS_LIST = data.elements.map(el => ({ lat: el.lat, lng: el.lon, name: el.tags.name || "固定式オービス" }));
                    updateOrbisMarkers();
                }
            } catch (e) {}
        }

        function updateOrbisMarkers() {
            if (!map) return; orbisMarkers.forEach(m => map.removeLayer(m)); orbisMarkers = [];
            ORBIS_LIST.forEach(orb => {
                const icon = L.divIcon({ className: '', html: `<div class="orbis-marker"><i data-lucide="camera" style="width:18px;height:18px;"></i></div>`, iconSize: [32, 32], iconAnchor: [16, 16] });
                const m = L.marker([orb.lat, orb.lng], { icon: icon }).addTo(map).bindPopup(`<b class="text-red-500">${orb.name}</b>`);
                orbisMarkers.push(m);
            });
            lucide.createIcons();
        }

        function checkOrbis(lat, lng) {
            if (ORBIS_LIST.length === 0) return;
            let minDist = Infinity;
            ORBIS_LIST.forEach(orb => { const d = getDistance(lat, lng, orb.lat, orb.lng); if (d < minDist) minDist = d; });
            const overlay = document.getElementById('orbis-flash-overlay');
            let zone = (minDist <= 200) ? 3 : (minDist <= 500) ? 2 : (minDist <= 1000) ? 1 : 0;
            if (zone !== currentOrbisZone) {
                overlay.className = '';
                if (zone === 1) { overlay.classList.add('flash-blue'); speakText("ゆーみん、1キロ以内にオービスあるで。"); }
                else if (zone === 2) { overlay.classList.add('flash-yellow'); speakText("あと500メートル！速度チェック！"); }
                else if (zone === 3) { overlay.classList.add('flash-red'); speakText("すぐそこ！本気で気をつけてな！"); }
                currentOrbisZone = zone;
            }
        }

        function updateLocation(pos) {
            const { latitude: lat, longitude: lng, accuracy, speed } = pos.coords;
            currentPos = [lat, lng]; fetchOrbisData(lat, lng); checkOrbis(lat, lng);
            if (marker) marker.setLatLng(currentPos);
            if (isTracking) {
                if (historyPoints.length > 0) {
                    const d = getDistance(historyPoints[historyPoints.length-1].lat, historyPoints[historyPoints.length-1].lng, lat, lng);
                    if (d > 3) { totalDistance += d; historyPoints.push({ lat, lng, time: Date.now() }); if (polyline) polyline.addLatLng(currentPos); }
                } else { historyPoints.push({ lat, lng, time: Date.now() }); if (polyline) polyline.addLatLng(currentPos); }
                document.getElementById('dist-display').textContent = (totalDistance / 1000).toFixed(2);
                document.getElementById('speed-display').textContent = speed ? (speed * 3.6).toFixed(1) : "0.0";
            }
        }

        function getDistance(la1, lo1, la2, lo2) {
            const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
            const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function switchView(id) {
            document.querySelectorAll('.view-screen').forEach(v => v.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) {
                target.classList.add('active');
                if (id === 'settings-view') { document.getElementById('api-key-input').value = localStorage.getItem('GEMINI_API_KEY') || ""; testAIConnection(); }
                if (id === 'map-overlay' && map) setTimeout(() => { map.invalidateSize(); if(currentPos) map.panTo(currentPos); updateOrbisMarkers(); }, 200);
                if (id === 'detail-view' && detailMap) setTimeout(() => { detailMap.invalidateSize(); }, 200);
                lucide.createIcons();
            }
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast'); if (t) { t.textContent = msg; t.style.display = 'block'; t.style.backgroundColor = isError ? '#ef4444' : '#000'; setTimeout(() => { if (t.textContent === msg) t.style.display = 'none'; }, 5000); }
        }

        async function loadHistory() {
            if (!user || !db) return; const listEl = document.getElementById('history-list'); if (!listEl) return;
            try {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'routes'));
                const querySnapshot = await getDocs(q);
                let items = []; querySnapshot.forEach((doc) => { const data = doc.data(); if(data.userId === user.uid) items.push({ id: doc.id, ...data }); });
                items.sort((a,b) => b.startTime - a.startTime);
                listEl.innerHTML = items.length ? '' : '<p class="text-center text-gray-400 mt-10">記録がまだあらへんわ。</p>';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "history-item bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4 active:scale-95 transition-all";
                    div.innerHTML = `<div class="bg-pink-100 p-3 rounded-full text-pink-500 shrink-0"><i data-lucide="${item.mode==='walking'?'footprints':'car'}"></i></div><div class="flex-grow"><p class="font-bold text-sm">${new Date(item.startTime).toLocaleString('ja-JP')}</p><p class="text-[10px] text-gray-400">距離: ${(item.distance/1000).toFixed(2)} km</p></div><i data-lucide="chevron-right" class="text-gray-300"></i>`;
                    div.onclick = () => openRecordDetail(item); listEl.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) {}
        }

        function openRecordDetail(item) {
            document.getElementById('detail-date').textContent = new Date(item.startTime).toLocaleString('ja-JP');
            document.getElementById('detail-dist').textContent = (item.distance / 1000).toFixed(2);
            const diff = Math.floor((item.endTime - item.startTime) / 1000);
            document.getElementById('detail-time').textContent = `${String(Math.floor(diff/3600)).padStart(2,'0')}:${String(Math.floor((diff%3600)/60)).padStart(2,'0')}:${String(diff%60).padStart(2,'0')}`;
            document.getElementById('detail-mode-badge').innerHTML = `<i data-lucide="${item.mode==='walking'?'footprints':'car'}" class="w-3 h-3"></i> ${item.mode==='walking'?'ウォーキング':'ドライブ'}`;
            switchView('detail-view');
            if (!detailMap) { detailMap = L.map('detail-map', { zoomControl: false }); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(detailMap); }
            if (detailPolyline) detailMap.removeLayer(detailPolyline);
            const points = JSON.parse(item.points);
            if (points && points.length > 0) { const latlngs = points.map(p => [p.lat, p.lng]); detailPolyline = L.polyline(latlngs, { color: '#ec4899', weight: 5 }).addTo(detailMap); detailMap.fitBounds(detailPolyline.getBounds(), { padding: [20, 20] }); }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateNetworkStatus(); initFirebase(); updateClocks();
            document.body.addEventListener('touchstart', unlockAudio, { once: true });
            
            document.getElementById('open-settings-btn').onclick = () => switchView('settings-view');
            document.getElementById('close-settings-btn').onclick = () => switchView('main-view');
            document.getElementById('open-map-btn').onclick = () => switchView('map-overlay');
            document.getElementById('close-map-btn').onclick = () => switchView('main-view');
            document.getElementById('open-history-btn').onclick = () => switchView('history-view');
            document.getElementById('close-history-btn').onclick = () => switchView('main-view');
            document.getElementById('close-detail-btn').onclick = () => switchView('history-view');

            document.getElementById('dl-full-btn').onclick = async () => { showToast("作成中..."); const canvas = await html2canvas(document.getElementById('capture-area'), { useCORS: true, scale: 2 }); const link = document.createElement('a'); link.download = `record_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click(); showToast("保存！"); };
            document.getElementById('dl-no-map-btn').onclick = async () => { const mapEl = document.getElementById('detail-map'); mapEl.style.display = 'none'; const canvas = await html2canvas(document.getElementById('capture-area'), { useCORS: true, scale: 2 }); mapEl.style.display = 'block'; const link = document.createElement('a'); link.download = `stats_${Date.now()}.png`; link.href = canvas.toDataURL(); link.click(); showToast("保存！"); };

            document.getElementById('save-key-btn').onclick = async () => { 
                const key = document.getElementById('api-key-input').value.trim(); 
                localStorage.setItem('GEMINI_API_KEY', key); 
                showToast("保存完了！AIを確認するわな..."); 
                await testAIConnection(key);
            };
            
            const slider = document.getElementById('volume-slider'); slider.value = voiceVolume * 100;
            slider.oninput = (e) => { voiceVolume = e.target.value / 100; localStorage.setItem('voiceVolume', voiceVolume); };
            const muteBtn = document.getElementById('mute-toggle-btn');
            muteBtn.onclick = () => { isMuted = !isMuted; localStorage.setItem('isMuted', isMuted); document.getElementById('mute-icon').setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2'); muteBtn.classList.toggle('text-red-500', isMuted); lucide.createIcons(); };

            const walkBtn = document.getElementById('mode-walking');
            const driveBtn = document.getElementById('mode-driving');
            const hud = document.getElementById('nav-hud');

            const handleWalk = (e) => { e.preventDefault(); currentMode = 'walking'; walkBtn.classList.add('active'); driveBtn.classList.remove('active'); driveBtn.classList.add('bg-gray-50', 'text-gray-400'); hud.style.display = 'none'; };
            const handleDrive = (e) => { e.preventDefault(); currentMode = 'driving'; driveBtn.classList.add('active'); driveBtn.classList.remove('bg-gray-50', 'text-gray-400'); walkBtn.classList.remove('active'); walkBtn.classList.add('bg-gray-50', 'text-gray-400'); hud.style.display = 'flex'; };

            walkBtn.addEventListener('click', handleWalk);
            walkBtn.addEventListener('touchend', handleWalk);
            driveBtn.addEventListener('click', handleDrive);
            driveBtn.addEventListener('touchend', handleDrive);

            document.getElementById('stop-nav-btn').onclick = () => hud.style.display = 'none';

            document.getElementById('record-toggle-btn').onclick = async () => {
                if (!user || !db) { showToast("ログイン待ちやで！", true); return; }
                isTracking = !isTracking; const text = document.getElementById('btn-text'); const icon = document.getElementById('btn-icon');
                if (isTracking) { startTime = Date.now(); totalDistance = 0; historyPoints = []; if(polyline) polyline.setLatLngs([]); speakText("記録開始や！"); document.getElementById('record-toggle-btn').classList.replace('bg-green-500', 'bg-red-500'); text.textContent = "記録停止"; icon.setAttribute('data-lucide', 'square'); }
                else { speakText("保存するね！"); document.getElementById('record-toggle-btn').classList.replace('bg-red-500', 'bg-green-500'); text.textContent = "記録開始"; icon.setAttribute('data-lucide', 'play'); try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'routes'), { userId: user.uid, mode: currentMode, distance: totalDistance, startTime: startTime, endTime: Date.now(), points: JSON.stringify(historyPoints) }); loadHistory(); } catch (err) { showToast("失敗したわ…", true); } }
                lucide.createIcons();
            };

            const sr = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (sr) {
                const rec = new sr(); rec.lang = 'ja-JP'; 
                rec.onstart = () => { isSpeechRecognizing = true; document.getElementById('ai-mic-btn').classList.add('recording'); showToast("🎙️ 聞いてるで！"); };
                rec.onend = () => { isSpeechRecognizing = false; document.getElementById('ai-mic-btn').classList.remove('recording'); };
                rec.onerror = () => { isSpeechRecognizing = false; document.getElementById('ai-mic-btn').classList.remove('recording'); };
                rec.onresult = (e) => askSakuraAI(e.results[0][0].transcript);
                const micBtn = document.getElementById('ai-mic-btn');
                const handleMic = (e) => { if (e) e.preventDefault(); if (isSpeechRecognizing) return; unlockAudio(); try { rec.start(); } catch(err) {} };
                micBtn.addEventListener('click', (e) => { if (e.pointerType === "touch") return; handleMic(e); });
                micBtn.addEventListener('touchend', handleMic);
            }

            map = L.map('map', { zoomControl: false }).setView([35.68, 139.76], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            polyline = L.polyline([], { color: '#ec4899', weight: 6 }).addTo(map); marker = L.circleMarker([35.68, 139.76], { radius: 8, fillColor: "#ec4899", color: "#fff", weight: 3 }).addTo(map);
            if ("geolocation" in navigator) navigator.geolocation.watchPosition(updateLocation, null, { enableHighAccuracy: true });
            document.getElementById('center-btn').onclick = () => { if(currentPos) { map.panTo(currentPos); map.setZoom(17); } };
            lucide.createIcons();
        });
    </script>
</body>
